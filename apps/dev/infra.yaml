apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
spec:
  project: dev

  source:
    repoURL: https://github.com/tekne-ops/gitops-platform
    targetRevision: main
    path: infrastructure

  destination:
    server: https://kubernetes.default.svc
    # Default for charts that omit metadata.namespace (e.g. grafana-agent).
    # Charts with explicit namespace (ingress-nginx, cert-manager) are unchanged.
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
