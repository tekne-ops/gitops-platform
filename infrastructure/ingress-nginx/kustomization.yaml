helmGlobals:
  chartHome: /tmp/helmcharts

helmCharts:
  - name: ingress-nginx
    repo: https://kubernetes.github.io/ingress-nginx
    version: 4.10.0
    releaseName: ingress-nginx
    namespace: ingress-nginx
    valuesInline:
      controller:
        ingressClass: nginx
        service:
          type: NodePort
          nodePorts:
            http: 30080
            https: 30443